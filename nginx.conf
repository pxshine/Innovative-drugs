# Nginx 配置示例 - 创新药自学指南
# 保存为 /etc/nginx/sites-available/innovative-drug.conf
# 然后 ln -s 到 sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # 修改为你的实际部署路径
    root /var/www/innovative-drug;
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 静态资源缓存（CSS / 图片 / 字体）
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML 文件不强缓存（方便更新）
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # 主路由
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 错误页
    error_page 404 /404.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 日志
    access_log /var/log/nginx/innovative-drug.access.log;
    error_log /var/log/nginx/innovative-drug.error.log;
}

